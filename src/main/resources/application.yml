spring:
  application:
    name: adventure-book
  datasource:
    driver-class-name: org.h2.Driver
    password: ''
    url: jdbc:h2:mem:adventuredb
    username: sa
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    serialization:
      fail-on-empty-beans: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: true


